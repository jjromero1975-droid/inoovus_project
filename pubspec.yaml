name: inoovus_project
description: Plataforma integral para gestión de obras, asistencia y documentación en tiempo real

publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  
  # ==================== STATE MANAGEMENT ====================
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # ==================== NAVIGATION ====================
  go_router: ^12.0.0
  
  # ==================== FIREBASE ====================
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.6.0
  
  # ==================== LOCAL STORAGE ====================
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  
  # ==================== UI ====================
  flutter_screenutil: ^5.9.0
  intl: ^0.19.0
  
  # ==================== LOCATION ====================
  geolocator: ^9.0.2
  
  # ==================== DOCUMENTS ====================
  pdf: ^3.10.4
  
  # ==================== QR ====================
  qr_flutter: ^4.1.0
  
  # ==================== UTILITIES ====================
  logger: ^2.0.1
  get_it: ^7.6.0
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.6
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/logo/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
